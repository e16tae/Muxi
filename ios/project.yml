name: Muxi
options:
  bundleIdPrefix: com.muxi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"

packages:
  MuxiCore:
    path: MuxiCore

targets:
  Muxi:
    type: application
    platform: iOS
    sources:
      - path: Muxi
        excludes:
          - "Resources/Themes/**"
      - path: Muxi/Resources/Themes
        type: folder
        buildPhase: resources
    dependencies:
      - package: MuxiCore
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.muxi.app
        PRODUCT_NAME: Muxi
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"

  MuxiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MuxiTests
    dependencies:
      - target: Muxi
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.muxi.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Muxi.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Muxi"
        BUNDLE_LOADER: "$(TEST_HOST)"
